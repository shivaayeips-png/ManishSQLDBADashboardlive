<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer SQL Server Monitoring Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
            min-height: 100vh;
            padding: 25px;
            color: white;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 1em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .last-updated {
            color: #cbd5e1;
            font-size: 0.9em;
        }

        .refresh-btn {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .auto-refresh-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .auto-refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .customer-selector {
            background: rgba(30, 27, 75, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            margin-bottom: 25px;
        }

        .selector-label {
            font-size: 1em;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 12px;
            display: block;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            font-size: 1em;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            background: rgba(30, 27, 75, 0.8);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:hover {
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(30, 27, 75, 0.9);
        }

        select:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        select option {
            background: #1e1b4b;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(30, 27, 75, 0.6);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
        }

        .stat-card.teal::before {
            background: linear-gradient(90deg, #14b8a6 0%, #06b6d4 100%);
        }

        .stat-card.blue::before {
            background: linear-gradient(90deg, #3b82f6 0%, #6366f1 100%);
        }

        .stat-card.orange::before {
            background: linear-gradient(90deg, #f59e0b 0%, #ef4444 100%);
        }

        .stat-card.purple::before {
            background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 100%);
        }

        .stat-icon {
            font-size: 1.5em;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .stat-label {
            font-size: 0.9em;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .stat-subtext {
            font-size: 0.85em;
            color: #94a3b8;
            margin-top: 5px;
        }

        .stat-progress {
            width: 100%;
            height: 4px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        .stat-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #14b8a6 100%);
            border-radius: 2px;
            transition: width 0.3s;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #cbd5e1;
        }

        .tab.active {
            color: white;
            border-bottom-color: #8b5cf6;
        }

        .content-section {
            background: rgba(30, 27, 75, 0.6);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.3em;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            font-size: 1.2em;
        }

        .server-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: all 0.3s;
        }

        .server-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .server-card.offline {
            border-left-color: #f5576c;
            background: #fff5f5;
        }

        .server-card.online {
            border-left-color: #51cf66;
            background: #f0fff4;
        }

        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .server-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .status-online {
            background: #51cf66;
            color: white;
        }

        .status-offline {
            background: #f5576c;
            color: white;
        }

        .server-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            padding: 10px;
            background: white;
            border-radius: 8px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .database-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .database-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .database-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .database-table tr:hover {
            background: #f8f9fa;
        }

        .db-status-online {
            color: #51cf66;
            font-weight: 600;
        }

        .db-status-offline {
            color: #f5576c;
            font-weight: 600;
        }

        .error-message {
            background: #fff5f5;
            border: 2px solid #f5576c;
            color: #c92a2a;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .last-updated {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Customer SQL Server Monitoring</h1>
            <p class="subtitle">Monitor server and database availability for Top 10 Customers</p>
        </div>

        <div class="customer-selector">
            <label class="selector-label">Select Customer:</label>
            <select id="customerDropdown" onchange="loadCustomerData()">
                <option value="">-- Select a Customer --</option>
            </select>
            <button class="refresh-btn" onclick="loadCustomerData()" style="margin-top: 15px;">🔄 Refresh Data</button>
        </div>

        <div id="loadingIndicator" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading customer data...</p>
        </div>

        <div id="customerContent" style="display: none;">
            <div class="customer-info">
                <h2 id="customerName">Customer Name</h2>
                <div class="info-grid">
                    <div class="info-item" id="priorityBadge">
                        <div class="info-label">Priority</div>
                        <div class="info-value" id="customerPriority">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Total Servers</div>
                        <div class="info-value" id="totalServers">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Available Servers</div>
                        <div class="info-value" id="availableServers">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Total Databases</div>
                        <div class="info-value" id="totalDatabases">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Online Databases</div>
                        <div class="info-value" id="onlineDatabases">0</div>
                    </div>
                </div>
            </div>

            <div class="servers-section">
                <h2 class="section-title">🖥️ Server Availability</h2>
                <div id="serversContainer"></div>
            </div>

            <div class="databases-section">
                <h2 class="section-title">💾 Database Availability</h2>
                <div id="databasesContainer"></div>
            </div>

            <div class="last-updated" id="lastUpdated"></div>
        </div>

        <div id="errorMessage" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api/monitoring';

        // Load customers on page load
        window.onload = function() {
            loadCustomers();
        };

        async function loadCustomers() {
            try {
                const response = await fetch(`${API_BASE}/customers`);
                const data = await response.json();
                
                const dropdown = document.getElementById('customerDropdown');
                dropdown.innerHTML = '<option value="">-- Select a Customer --</option>';
                
                data.customers.forEach(customer => {
                    const option = document.createElement('option');
                    option.value = customer.customer_id;
                    option.textContent = `${customer.customer_name} (${customer.priority} Priority - ${customer.server_count} servers)`;
                    dropdown.appendChild(option);
                });
            } catch (error) {
                showError('Failed to load customers: ' + error.message);
            }
        }

        async function loadCustomerData() {
            const customerId = document.getElementById('customerDropdown').value;
            
            if (!customerId) {
                document.getElementById('customerContent').style.display = 'none';
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_BASE}/customers/${customerId}/status`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                displayCustomerData(data);
                showLoading(false);
                document.getElementById('customerContent').style.display = 'block';
            } catch (error) {
                showLoading(false);
                showError('Failed to load customer data: ' + error.message);
            }
        }

        function displayCustomerData(data) {
            // Customer info
            document.getElementById('customerName').textContent = data.customer_name;
            document.getElementById('customerPriority').textContent = data.priority;
            
            const priorityBadge = document.getElementById('priorityBadge');
            priorityBadge.className = 'info-item priority-' + data.priority.toLowerCase();

            // Summary
            document.getElementById('totalServers').textContent = data.summary.total_servers;
            document.getElementById('availableServers').textContent = data.summary.available_servers;
            document.getElementById('totalDatabases').textContent = data.summary.total_databases;
            document.getElementById('onlineDatabases').textContent = data.summary.online_databases;

            // Servers
            displayServers(data.servers);

            // Databases
            displayDatabases(data.databases);

            // Last updated
            document.getElementById('lastUpdated').textContent = 
                'Last updated: ' + new Date(data.timestamp).toLocaleString();
        }

        function displayServers(servers) {
            const container = document.getElementById('serversContainer');
            
            if (servers.length === 0) {
                container.innerHTML = '<p>No server data available</p>';
                return;
            }

            container.innerHTML = servers.map(server => `
                <div class="server-card ${server.IsAvailable ? 'online' : 'offline'}">
                    <div class="server-header">
                        <div class="server-name">${server.ServerName}</div>
                        <span class="status-badge ${server.IsAvailable ? 'status-online' : 'status-offline'}">
                            ${server.IsAvailable ? '✓ ONLINE' : '✗ OFFLINE'}
                        </span>
                    </div>
                    <div class="server-details">
                        <div class="detail-item">
                            <div class="detail-label">Response Time</div>
                            <div class="detail-value">${server.ResponseTimeMs || 0} ms</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">CPU Usage</div>
                            <div class="detail-value">${server.CPUUsagePercent || 0}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Memory Usage</div>
                            <div class="detail-value">${server.MemoryUsagePercent || 0}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Connections</div>
                            <div class="detail-value">${server.ActiveConnections || 0}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Online DBs</div>
                            <div class="detail-value">${server.OnlineDatabaseCount || 0}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayDatabases(databases) {
            const container = document.getElementById('databasesContainer');
            
            if (databases.length === 0) {
                container.innerHTML = '<p>No database data available</p>';
                return;
            }

            container.innerHTML = `
                <table class="database-table">
                    <thead>
                        <tr>
                            <th>Server</th>
                            <th>Database Name</th>
                            <th>Status</th>
                            <th>Recovery Model</th>
                            <th>Size (MB)</th>
                            <th>Compatibility</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${databases.map(db => `
                            <tr>
                                <td>${db.ServerName}</td>
                                <td><strong>${db.DatabaseName}</strong></td>
                                <td class="${db.State === 'ONLINE' ? 'db-status-online' : 'db-status-offline'}">
                                    ${db.State}
                                </td>
                                <td>${db.RecoveryModel}</td>
                                <td>${db.SizeMB.toFixed(2)}</td>
                                <td>${db.CompatibilityLevel}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<strong>Error:</strong> ${message}`;
            errorDiv.style.display = 'block';
            document.getElementById('customerContent').style.display = 'none';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
